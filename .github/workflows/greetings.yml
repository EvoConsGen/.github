name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message:  |
            Thanks @${{ github.actor }} for opening this issue!
            I'll take a look and assign myself shortly. 
            In the meantime, feel free to add any details about the analysis you have in mind
        pr-message:  |
            Thanks for your first pull request, @${{ github.actor }}!
            I'll review this against our workflow standards (comments, conda env, test data). 
            I'll get back to you within a few days.
